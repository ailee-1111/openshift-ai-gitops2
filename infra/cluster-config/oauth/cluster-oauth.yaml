apiVersion: config.openshift.io/v1
kind: OAuth
metadata:
  annotations:
    include.release.openshift.io/ibm-cloud-managed: 'true'
    include.release.openshift.io/self-managed-high-availability: 'true'
    release.openshift.io/create-only: 'true'
  name: cluster
  ownerReferences:
  - apiVersion: config.openshift.io/v1
    kind: ClusterVersion
    name: version
    uid: b759a847-2160-4b5d-8378-0eb1340a61c2
spec:
  identityProviders:
  - htpasswd:
      fileData:
        name: htpasswd-secret
    mappingMethod: claim
    name: HDM
    type: HTPasswd
  - htpasswd:
      fileData:
        name: htpasswd-poc
    name: htpasswd-poc
    type: HTPasswd
  - name: mobis-ldap
    mappingMethod: claim
    type: LDAP
    ldap:
      url: "ldap://gjldap.mobis.co.kr:389/DC=mobis,DC=co,DC=kr?sAMAccountName?sub?(objectClass=person)"
      bindDN: "CN=Service_rhoai,OU=Service Accounts,OU=Manage Accounts,DC=mobis,DC=co,DC=kr"
      bindPassword:
        name: ldap-bind-password
      insecure: true
      attributes:
        id:
        - sAMAccountName
        preferredUsername:
        - sAMAccountName
        name:
        - displayName
        email:
        - mail
