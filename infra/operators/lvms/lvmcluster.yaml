apiVersion: lvm.topolvm.io/v1alpha1
kind: LVMCluster
metadata:
  name: lvmcluster
  namespace: openshift-storage
spec:
  storage:
    deviceClasses:
      - name: vg-master
        default: true
        fstype: xfs
        deviceSelector:
          paths:
            - /dev/sda
            - /dev/sdc
        nodeSelector:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - master01.poc.mobis.com
        thinPoolConfig:
          name: thin-pool
          sizePercent: 90
          overprovisionRatio: 10
          chunkSizeCalculationPolicy: Static
          metadataSizeCalculationPolicy: Host
      - name: vg-worker
        fstype: xfs
        deviceSelector:
          paths:
            - /dev/sdb
        nodeSelector:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - worker01.poc.mobis.com
        thinPoolConfig:
          name: thin-pool
          sizePercent: 90
          overprovisionRatio: 10
          chunkSizeCalculationPolicy: Static
          metadataSizeCalculationPolicy: Host
