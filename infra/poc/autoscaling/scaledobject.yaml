# м¶ңмІҳ: poc-factory pocs/rhoai/gitops/base/autoscaling/scaledobject.yaml
# мЈјмқҳ: scaleTargetRef.nameкіј queryмқҳ namespaceлҠ” PoC нҷҳкІҪм—җ л§һкІҢ мЎ°м • н•„мҡ”
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vllm-autoscaler
spec:
  scaleTargetRef:
    name: smollm2-135m-predictor
  pollingInterval: 10
  cooldownPeriod: 60
  minReplicaCount: 1
  maxReplicaCount: 3
  triggers:
    - type: prometheus
      authenticationRef:
        name: keda-prometheus-creds
      metadata:
        serverAddress: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        threshold: "2"
        activationThreshold: "1"
        authModes: bearer
        unsafeSsl: "true"
        query: |
          sum(vllm:num_requests_running{namespace="rhoai-poc-llm"}) + sum(vllm:num_requests_waiting{namespace="rhoai-poc-llm"})
