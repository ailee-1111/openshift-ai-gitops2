# 출처: Session 32 트러블슈팅 — EvalHub Job SA에 cluster-admin 부여
# PoC 전용. 프로덕션에서는 최소 권한으로 대체 필요.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: evalhub-job-sa-full-access
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
- kind: ServiceAccount
  name: evalhub-redhat-ods-applications-job
  namespace: rhoai-poc
