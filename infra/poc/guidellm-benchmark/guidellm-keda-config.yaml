apiVersion: v1
kind: ConfigMap
metadata:
  name: guidellm-keda-config
  namespace: mobis-poc
  labels:
    app: guidellm-keda-benchmark
  annotations:
    description: |
      KEDA 스케일아웃 테스트용 GuideLLM 파라미터.
      synthetic_text + output_tokens=512로 충분한 부하 생성.
      concurrent 16으로 동시 요청하여 KEDA 트리거 유도.
data:
  GUIDELLM_TARGET: "http://smollm2-135m-predictor.mobis-poc.svc.cluster.local:8080/v1"
  GUIDELLM_REQUEST_FORMAT: "/v1/completions"
  GUIDELLM_DATA: "kind=synthetic_text,prompt_tokens=256,output_tokens=512"
  GUIDELLM_PROCESSOR: "HuggingFaceTB/SmolLM2-135M"
  GUIDELLM_PROFILE: "concurrent"
  GUIDELLM_RATE: "16"
  GUIDELLM_MAX_SECONDS: "120"
  GUIDELLM_MAX_REQUESTS: ""
