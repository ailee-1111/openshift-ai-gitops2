<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>GuideLLM Benchmark Report</title>
<script>window.runInfo = {}; window.workloadDetails = {}; window.benchmarks = {};</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e13;color:#e1e2e9;font-family:-apple-system,'Malgun Gothic',sans-serif}
.wrap{max-width:1280px;margin:0 auto;padding:32px}
header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:32px;border-bottom:1px solid #1e2130;padding-bottom:20px}
h1{font-size:28px;color:#2a8efd}
h1 span{font-size:14px;color:#888;font-weight:400;margin-left:8px}
.meta{font-size:13px;color:#888;text-align:right}
.cards{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}
.card{background:#1a1d27;border-radius:10px;padding:18px 22px;min-width:150px;flex:1}
.card .val{font-size:26px;font-weight:700;color:#2a8efd}
.card .lbl{font-size:11px;color:#666;margin-top:4px;text-transform:uppercase}
.section{background:#1a1d27;border-radius:10px;padding:20px;margin-bottom:20px}
.section h2{font-size:16px;color:#2a8efd;margin-bottom:14px;font-weight:600}
table{width:100%;border-collapse:collapse;font-size:13px}
th{color:#666;padding:10px 6px;text-align:center;font-weight:500;border-bottom:2px solid #252838;white-space:nowrap}
td{padding:9px 6px;text-align:center;border-bottom:1px solid #1e2130}
tr:hover td{background:rgba(42,142,253,.05)}
.pass{color:#4caf50;font-weight:600}
.bar-wrap{width:100%;background:#1e2130;border-radius:3px;height:6px}
.bar{background:linear-gradient(90deg,#2a8efd,#5c6bc0);height:6px;border-radius:3px;transition:width .3s}
.chart{display:flex;align-items:flex-end;gap:2px;height:120px;margin:12px 0}
.chart-bar{background:linear-gradient(0deg,#2a8efd,#5c6bc0);border-radius:2px 2px 0 0;min-width:20px;flex:1;position:relative;cursor:pointer}
.chart-bar:hover{opacity:.8}
.chart-bar .tip{display:none;position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:4px 8px;border-radius:4px;font-size:11px;white-space:nowrap}
.chart-bar:hover .tip{display:block}
.chart-label{display:flex;justify-content:space-between;font-size:11px;color:#666}
footer{text-align:center;color:#444;font-size:11px;margin-top:24px;padding-top:16px;border-top:1px solid #1e2130}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:768px){.grid{grid-template-columns:1fr}.cards{flex-direction:column}}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
(function(){
  const ri = window.runInfo || {};
  const wd = window.workloadDetails || {};
  const bms = window.benchmarks || [];
  const app = document.getElementById('app');

  if (!bms.length) {
    app.innerHTML = '<header><h1>GuideLLM Report</h1></header><p style="color:#888;padding:40px;text-align:center">No benchmark data available.</p>';
    return;
  }

  const model = (ri.model && ri.model.name) || 'N/A';
  const target = (wd.server && wd.server.target) || 'N/A';
  const rateType = wd.rateType || 'sweep';
  const ts = ri.timestamp ? new Date(ri.timestamp * 1000).toLocaleString('ko-KR') : '';

  function fmt(v, d) { return v != null ? Number(v).toFixed(d || 1) : '-'; }
  function pval(obj, key) { return obj && obj.percentiles && obj.percentiles[key]; }

  // Summary cards
  const b0 = bms[0];
  const totalReqs = bms.reduce((s, b) => s + (b.requestsPerSecond || 0), 0);
  const maxRps = Math.max(...bms.map(b => b.requestsPerSecond || 0));

  let html = `
    <header>
      <div><h1>GuideLLM Report<span>v0.6.0</span></h1>
      <div style="color:#888;font-size:13px;margin-top:4px">${model} | ${rateType} | ${bms.length} benchmarks</div></div>
      <div class="meta">Target: ${target}<br>${ts}</div>
    </header>
    <div class="cards">
      <div class="card"><div class="val">${fmt(pval(b0.timePerRequest,'p50')*1000)}ms</div><div class="lbl">Latency p50</div></div>
      <div class="card"><div class="val">${fmt(pval(b0.ttft,'p50'))}ms</div><div class="lbl">TTFT p50</div></div>
      <div class="card"><div class="val">${fmt(pval(b0.itl,'p50'))}ms</div><div class="lbl">ITL p50</div></div>
      <div class="card"><div class="val">${fmt(b0.throughput && b0.throughput.mean)}</div><div class="lbl">Tok/s Mean</div></div>
      <div class="card"><div class="val">${fmt(maxRps)}</div><div class="lbl">Max RPS</div></div>
    </div>`;

  // Latency chart
  const latencies = bms.map(b => (pval(b.timePerRequest,'p50') || 0) * 1000);
  const maxLat = Math.max(...latencies, 1);
  html += `<div class="section"><h2>Request Latency p50 (ms)</h2><div class="chart">`;
  bms.forEach((b, i) => {
    const v = latencies[i];
    const h = (v / maxLat * 100);
    html += `<div class="chart-bar" style="height:${h}%"><div class="tip">#${i} ${fmt(v)}ms</div></div>`;
  });
  html += `</div><div class="chart-label"><span>sync</span><span>→ load increase →</span><span>max throughput</span></div></div>`;

  // Throughput chart
  const tps = bms.map(b => (b.throughput && b.throughput.mean) || 0);
  const maxTps = Math.max(...tps, 1);
  html += `<div class="section"><h2>Output Tokens/sec (Mean)</h2><div class="chart">`;
  bms.forEach((b, i) => {
    const v = tps[i];
    const h = (v / maxTps * 100);
    html += `<div class="chart-bar" style="height:${h}%"><div class="tip">#${i} ${fmt(v)} tok/s</div></div>`;
  });
  html += `</div><div class="chart-label"><span>sync</span><span>→ load increase →</span><span>max throughput</span></div></div>`;

  // Detail table
  html += `<div class="section"><h2>Benchmark Details</h2><table>
    <tr><th>#</th><th>RPS</th><th>Latency p50</th><th>Latency p99</th><th>TTFT p50</th><th>TTFT p99</th><th>ITL p50</th><th>ITL p99</th><th>Tok/s</th><th></th></tr>`;
  bms.forEach((b, i) => {
    const lp50 = (pval(b.timePerRequest,'p50') || 0) * 1000;
    const lp99 = (pval(b.timePerRequest,'p99') || pval(b.timePerRequest,'p95') || 0) * 1000;
    const w = lp50 / maxLat * 100;
    html += `<tr>
      <td>${i}</td>
      <td>${fmt(b.requestsPerSecond)}</td>
      <td>${fmt(lp50)}ms</td><td>${fmt(lp99)}ms</td>
      <td>${fmt(pval(b.ttft,'p50'))}ms</td><td>${fmt(pval(b.ttft,'p99') || pval(b.ttft,'p95'))}ms</td>
      <td>${fmt(pval(b.itl,'p50'))}ms</td><td>${fmt(pval(b.itl,'p99') || pval(b.itl,'p95'))}ms</td>
      <td>${fmt(b.throughput && b.throughput.mean)}</td>
      <td><div class="bar-wrap"><div class="bar" style="width:${w}%"></div></div></td>
    </tr>`;
  });
  html += '</table></div>';

  // TTFT / ITL detail
  html += `<div class="grid">
    <div class="section"><h2>TTFT Distribution (ms)</h2><table>
      <tr><th>#</th><th>Mean</th><th>p50</th><th>p90</th><th>p95</th><th>p99</th></tr>`;
  bms.forEach((b, i) => {
    const t = b.ttft || {};
    html += `<tr><td>${i}</td><td>${fmt(t.mean)}</td><td>${fmt(pval(t,'p50'))}</td><td>${fmt(pval(t,'p90'))}</td><td>${fmt(pval(t,'p95'))}</td><td>${fmt(pval(t,'p99') || pval(t,'p95'))}</td></tr>`;
  });
  html += `</table></div>
    <div class="section"><h2>ITL Distribution (ms)</h2><table>
      <tr><th>#</th><th>Mean</th><th>p50</th><th>p90</th><th>p95</th><th>p99</th></tr>`;
  bms.forEach((b, i) => {
    const t = b.itl || {};
    html += `<tr><td>${i}</td><td>${fmt(t.mean)}</td><td>${fmt(pval(t,'p50'))}</td><td>${fmt(pval(t,'p90'))}</td><td>${fmt(pval(t,'p95'))}</td><td>${fmt(pval(t,'p99') || pval(t,'p95'))}</td></tr>`;
  });
  html += '</table></div></div>';

  html += `<footer>Generated by GuideLLM ${ts} | Model: ${model} | Target: ${target}</footer>`;
  app.innerHTML = html;
})();
</script>
</body>
</html>
