# LDAP Group Sync — oc adm groups sync --sync-config 에서 사용
kind: LDAPSyncConfig
apiVersion: v1
url: ldap://ldap-server.poc-ldap.svc.cluster.local:389
insecure: true
bindDN: "cn=Directory Manager"
bindPassword:
  file: /tmp/ldap-bind-password
rfc2307:
  groupsQuery:
    baseDN: "dc=mobis,dc=local"
    scope: sub
    derefAliases: never
    filter: (objectClass=groupOfUniqueNames)
  groupUIDAttribute: dn
  groupNameAttributes: ["cn"]
  groupMembershipAttributes: ["uniqueMember"]
  usersQuery:
    baseDN: "ou=users,dc=mobis,dc=local"
    scope: sub
    derefAliases: never
  userUIDAttribute: dn
  userNameAttributes: ["uid"]
