# LDAP PoC — SSO/LDAP/AD 연동 검증용 (No.45/46)
# 389-ds (Red Hat Directory Server 오픈소스) — quay.io에서 접근 가능
apiVersion: v1
kind: Namespace
metadata:
  name: poc-ldap
  labels:
    poc: ldap-test
---
apiVersion: v1
kind: Secret
metadata:
  name: ldap-credentials
  namespace: poc-ldap
type: Opaque
stringData:
  DS_DM_PASSWORD: "CHANGE_ME"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ldap-server
  namespace: poc-ldap
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ldap-server
  template:
    metadata:
      labels:
        app: ldap-server
    spec:
      containers:
        - name: ds
          image: quay.io/389ds/dirsrv:latest
          ports:
            - containerPort: 3389
              name: ldap
            - containerPort: 3636
              name: ldaps
          env:
            - name: DS_DM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-credentials
                  key: DS_DM_PASSWORD
            - name: DS_SUFFIX_NAME
              value: "dc=mobis,dc=local"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ldap-server
  namespace: poc-ldap
spec:
  selector:
    app: ldap-server
  ports:
    - name: ldap
      port: 389
      targetPort: 3389
    - name: ldaps
      port: 636
      targetPort: 3636
