apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canary-model-routing
  namespace: mobis-poc
  labels:
    scenario: canary
spec:
  parentRefs:
    - name: maas-default-gateway
      namespace: openshift-ingress
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/canary
      backendRefs:
        - name: smollm2-135m-predictor
          port: 8080
          weight: 80
        - name: smollm2-135m-canary-predictor
          port: 8080
          weight: 20
