apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: maas-model-routing
  namespace: rhoai-poc
spec:
  parentRefs:
    - name: maas-default-gateway
      namespace: openshift-ingress
      sectionName: https
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: smollm2-135m-metrics
          port: 8080
          weight: 80
        - name: qwen3-8b-metrics
          port: 8080
          weight: 20
