apiVersion: monitoring.rhobs/v1alpha1
kind: MonitoringStack
metadata:
  name: maas-alerting-stack
  namespace: kuadrant-system
spec:
  alertmanagerConfig:
    disabled: false
    replicas: 2
  createClusterRoleBindings: CreateClusterRoleBindings
  logLevel: info
  namespaceSelector:
    matchLabels:
      monitoring.rhobs: maas-alerts
  prometheusConfig:
    replicas: 1
  resourceSelector:
    matchLabels:
      maas-alerting: 'true'
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 50m
      memory: 128Mi
  retention: 7d
---
apiVersion: monitoring.rhobs/v1
kind: PrometheusRule
metadata:
  labels:
    maas-alerting: 'true'
  name: maas-token-alerts
  namespace: kuadrant-system
spec:
  groups:
  - name: maas-token-limits
    rules:
    - alert: MaaSTokenLimitExceeded
      annotations:
        description: '사용자 {{ $labels.user }} (구독: {{ $labels.subscription }}, 모델:
          {{ $labels.model }})의

          토큰 사용률이 {{ $value | printf "%.2f" }} hits/s를 초과했습니다.

          '
        summary: MaaS 토큰 사용량 초과 — {{ $labels.user }}
      expr: "sum by (user, subscription, model) (\n  rate(authorized_hits[5m])\n)\
        \ > 0.5\n"
      for: 1m
      labels:
        service: maas
        severity: warning
    - alert: MaaSRateLimited
      annotations:
        description: '사용자 {{ $labels.user }} (구독: {{ $labels.subscription }})에 Rate
          Limit 발동.

          '
        summary: MaaS Rate Limit 발동 — {{ $labels.user }}
      expr: 'sum by (user, subscription) (limited_calls) > 0

        '
      for: 0m
      labels:
        service: maas
        severity: critical
---
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  labels:
    maas-alerting: 'true'
  name: maas-email-alerts
  namespace: kuadrant-system
spec:
  receivers:
  - emailConfigs:
    - from: rhoai@mobis.com
      headers:
      - key: Subject
        value: '[MaaS Alert] {{ .GroupLabels.alertname }} — {{ .GroupLabels.user }}'
      requireTLS: false
      smarthost: 10.240.13.184:25
      to: dt007000@mobis-partners.com
    name: maas-email
  route:
    groupBy:
    - alertname
    - user
    groupInterval: 5m
    groupWait: 30s
    matchers:
    - matchType: '='
      name: service
      value: maas
    receiver: maas-email
    repeatInterval: 1h
---
apiVersion: monitoring.rhobs/v1
kind: PodMonitor
metadata:
  labels:
    maas-alerting: 'true'
  name: limitador-maas-podmonitor
  namespace: kuadrant-system
spec:
  namespaceSelector:
    matchNames:
    - kuadrant-system
  podMetricsEndpoints:
  - path: /metrics
    port: http
    scheme: http
  selector:
    matchLabels:
      app: limitador
      limitador-resource: limitador
