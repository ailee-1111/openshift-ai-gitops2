apiVersion: v1
kind: ConfigMap
metadata:
  name: open-webui-trusted-ca
  namespace: customer-poc
  labels:
    config.openshift.io/inject-trusted-cabundle: "true"
data: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-webui-chatbot-test
  namespace: customer-poc
  labels:
    app: open-webui-chatbot-test
    scenario: fallback
spec:
  replicas: 1
  selector:
    matchLabels:
      app: open-webui-chatbot-test
  template:
    metadata:
      labels:
        app: open-webui-chatbot-test
        scenario: fallback
    spec:
      containers:
        - name: open-webui
          image: ghcr.io/open-webui/open-webui:v0.6.12
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: OPENAI_API_BASE_URLS
              value: "https://maas.apps.poc.customer.com/v1/fallback"
            - name: OPENAI_API_KEYS
              value: "dummy"
            - name: ENABLE_OPENAI_API
              value: "true"
            - name: ENABLE_OLLAMA_API
              value: "false"
            - name: WEBUI_AUTH
              value: "false"
            - name: WEBUI_NAME
              value: "Customer PoC Chatbot (Fallback Test)"
            - name: DEFAULT_MODELS
              value: "chatbot"
            - name: REQUESTS_CA_BUNDLE
              value: /etc/pki/tls/custom-ca/ca-bundle.crt
            - name: SSL_CERT_FILE
              value: /etc/pki/tls/custom-ca/ca-bundle.crt
          volumeMounts:
            - name: data
              mountPath: /app/backend/data
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom-ca
              readOnly: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
        - name: trusted-ca
          configMap:
            name: open-webui-trusted-ca
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
            optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: open-webui-chatbot-test
  namespace: customer-poc
  labels:
    app: open-webui-chatbot-test
spec:
  selector:
    app: open-webui-chatbot-test
  ports:
    - port: 8080
      targetPort: http
      name: http
