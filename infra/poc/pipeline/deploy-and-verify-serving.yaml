apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: deploy-and-verify-serving
  namespace: customer-poc
spec:
  params:
  - name: model-name
    type: string
  - name: model-version
    type: string
  - name: model-version-id
    type: string
  - name: registered-model-id
    type: string
  - name: namespace
    type: string
  - name: s3-path
    type: string
  - name: s3-secret
    type: string
    default: poc-s3-connection
  - name: runtime
    type: string
    default: vllm-cuda-runtime
  - name: gpu-count
    type: string
    default: "1"
  results:
  - name: endpoint-status
    type: string
  steps:
  - name: deploy-and-verify
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    computeResources: {}
    env:
    - name: HOME
      value: /tmp
    script: |
      #!/bin/bash
      set -e
      MODEL="$(params.model-name)"
      VERSION="$(params.model-version)"
      VERSION_ID="$(params.model-version-id)"
      REGISTERED_MODEL_ID="$(params.registered-model-id)"
      NS="$(params.namespace)"
      S3PATH="$(params.s3-path)"
      S3_SECRET="$(params.s3-secret)"
      RUNTIME="$(params.runtime)"
      GPU_COUNT="$(params.gpu-count)"

      echo "=== Step 1: IS 확인/생성 ==="
      if oc get inferenceservice ${MODEL} -n ${NS} > /dev/null 2>&1; then
        echo "  기존 IS 존재 — 패치 진행"
        CURRENT_PATH=$(oc get inferenceservice ${MODEL} -n ${NS} \
          -o jsonpath='{.spec.predictor.model.storage.path}')
        echo "  현재 경로: ${CURRENT_PATH}"
        echo "  새 경로:   ${S3PATH}"

        oc patch inferenceservice ${MODEL} -n ${NS} --type=merge -p "{
          \"spec\": {\"predictor\": {\"model\": {\"storage\": {\"path\": \"${S3PATH}\"}}}}
        }"
        echo "  storage.path 패치 완료"
      else
        echo "  IS 없음 — 신규 생성"
        # GPU 수에 따라 args, 메모리 설정
        ARGS="--port=8080 --model=/mnt/models --served-model-name=${MODEL}"
        MEM_REQ="4Gi"; MEM_LIM="8Gi"
        if [ "${GPU_COUNT}" -ge 2 ]; then
          ARGS="${ARGS} --tensor-parallel-size=${GPU_COUNT} --dtype=bfloat16 --max-model-len=96000 --gpu-memory-utilization=0.95"
          MEM_REQ="64Gi"; MEM_LIM="64Gi"
        else
          ARGS="${ARGS} --dtype=float16 --max-model-len=2048"
        fi

        cat <<ISEOF | oc apply -f -
      apiVersion: serving.kserve.io/v1beta1
      kind: InferenceService
      metadata:
        name: ${MODEL}
        namespace: ${NS}
        labels:
          opendatahub.io/dashboard: "true"
          opendatahub.io/genai-asset: "true"
          modelregistry.opendatahub.io/model-version-id: "${VERSION_ID}"
          modelregistry.opendatahub.io/registered-model-id: "${REGISTERED_MODEL_ID}"
        annotations:
          serving.kserve.io/deploymentMode: RawDeployment
          openshift.io/display-name: "${MODEL}"
          opendatahub.io/model-type: generative
          opendatahub.io/connections: ${S3_SECRET}
          opendatahub.io/connection-path: ${S3PATH}
          modelregistry.opendatahub.io/model-version-name: "${VERSION}"
          modelregistry.opendatahub.io/model-registry: customer-registry
          modelregistry.opendatahub.io/registered-model-name: "${MODEL}"
          pipeline.tekton.dev/last-deploy: "$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
          pipeline.tekton.dev/s3-path: "${S3PATH}"
      spec:
        predictor:
          minReplicas: 1
          maxReplicas: 1
          model:
            modelFormat:
              name: vLLM
            runtime: ${RUNTIME}
            storage:
              key: ${S3_SECRET}
              path: ${S3PATH}
            args:
      $(echo "${ARGS}" | tr ' ' '\n' | sed 's/^/            - /')
            env:
              - name: HF_HUB_OFFLINE
                value: "1"
            resources:
              requests:
                cpu: "4"
                memory: ${MEM_REQ}
                nvidia.com/gpu: "${GPU_COUNT}"
              limits:
                cpu: "8"
                memory: ${MEM_LIM}
                nvidia.com/gpu: "${GPU_COUNT}"
      ISEOF
        echo "  IS 생성 완료: ${MODEL} (GPU=${GPU_COUNT}, runtime=${RUNTIME})"
        echo "  라벨/어노테이션 모두 포함 (추가 패치 불필요)"
        IS_CREATED="true"
      fi

      if [ "${IS_CREATED}" != "true" ]; then
        echo ""
        echo "=== Step 2: Model Registry 라벨/어노테이션 ==="
        oc label inferenceservice ${MODEL} -n ${NS} \
          "modelregistry.opendatahub.io/model-version-id=${VERSION_ID}" \
          "modelregistry.opendatahub.io/registered-model-id=${REGISTERED_MODEL_ID}" \
          "opendatahub.io/genai-asset=true" \
          --overwrite
        oc annotate inferenceservice ${MODEL} -n ${NS} \
          "modelregistry.opendatahub.io/model-version-name=${VERSION}" \
          "modelregistry.opendatahub.io/model-registry=customer-registry" \
          "modelregistry.opendatahub.io/registered-model-name=${MODEL}" \
          "opendatahub.io/connections=${S3_SECRET}" \
          "opendatahub.io/connection-path=${S3PATH}" \
          "pipeline.tekton.dev/last-deploy=$(date -u '+%Y-%m-%dT%H:%M:%SZ')" \
          "pipeline.tekton.dev/s3-path=${S3PATH}" \
          --overwrite
        echo "  version: ${VERSION} (id=${VERSION_ID})"
      fi

      echo ""
      echo "=== Step 4: IS Ready 대기 ==="
      oc wait inferenceservice ${MODEL} -n ${NS} \
        --for=condition=Ready --timeout=600s
      echo "  IS Ready 확인"

      echo ""
      echo "=== Step 5: vLLM Pod 상태 ==="
      oc get pods -n ${NS} \
        -l serving.kserve.io/inferenceservice=${MODEL} \
        --no-headers | awk '{printf "  %s %s %s\n", $1, $3, $5}'

      echo ""
      echo "=== Step 6: REST API 검증 ==="
      SVC_URL="http://${MODEL}-predictor.${NS}.svc.cluster.local:8080"
      for attempt in $(seq 1 10); do
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
          "${SVC_URL}/v1/models" 2>/dev/null)
        echo "  시도 ${attempt}: HTTP ${HTTP_CODE}"
        if [ "${HTTP_CODE}" = "200" ]; then
          echo "  REST API 정상"
          break
        fi
        sleep 5
      done

      echo ""
      echo "=== Step 7: 추론 테스트 ==="
      RESP=$(curl -s --max-time 30 "${SVC_URL}/v1/completions" \
        -H "Content-Type: application/json" \
        -d "{\"model\":\"${MODEL}\",\"prompt\":\"What is AI?\",\"max_tokens\":20}")
      FINISH=$(echo "${RESP}" | grep -o '"finish_reason":"[^"]*"' | cut -d'"' -f4)
      echo "  추론 결과: finish_reason=${FINISH}"

      if [ "${HTTP_CODE}" = "200" ] && [ -n "${FINISH}" ]; then
        echo ""
        echo "=== PASS: ${VERSION} 배포 + 검증 완료 ==="
        echo "  Model:   ${MODEL}"
        echo "  Version: ${VERSION} (id=${VERSION_ID})"
        echo "  S3:      ${S3PATH}"
        echo -n "PASS" > $(results.endpoint-status.path)
      else
        echo ""
        echo "=== FAIL: API=${HTTP_CODE}, finish=${FINISH} ==="
        echo -n "FAIL" > $(results.endpoint-status.path)
        exit 1
      fi
