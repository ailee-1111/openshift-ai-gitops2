apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: manage-team-mapping
  namespace: customer-poc
  labels:
    app.kubernetes.io/part-of: poc-pipeline
    scenario: cost-report
spec:
  description: |
    subscription→부서/팀 매핑을 ConfigMap에 등록·조회·삭제한다. 멱등.
    action: add(추가/수정), list(조회), delete(삭제)
  params:
  - name: action
    type: string
    default: "list"
    description: "add=추가/수정, list=조회, delete=삭제"
  - name: subscription
    type: string
    default: ""
    description: "대상 subscription 이름 (add/delete 시 필수)"
  - name: department
    type: string
    default: ""
    description: "부서명 (add 시 필수)"
  - name: team
    type: string
    default: ""
    description: "팀명 (add 시 필수)"
  - name: tier
    type: string
    default: "standard"
    description: "과금 티어 (premium/standard/free)"
  results:
  - name: mapping-count
    type: string
  - name: action-result
    type: string
  steps:
  - name: manage
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    env:
    - name: HOME
      value: /tmp
    volumeMounts:
    - name: team-mapping
      mountPath: /etc/cost-report
      readOnly: true
    script: |
      #!/bin/bash
      set -euo pipefail

      ACTION="$(params.action)"
      SUB="$(params.subscription)"
      DEPT="$(params.department)"
      TEAM="$(params.team)"
      TIER="$(params.tier)"

      echo "=== subscription→부서/팀 매핑 관리 ==="
      echo "Action: ${ACTION}"

      # ConfigMap 로드
      if [ -f /etc/cost-report/mapping.json ]; then
        cp /etc/cost-report/mapping.json /tmp/mapping.json
      else
        echo '{"_default":{"department":"미분류","team":"unknown","tier":"free"}}' > /tmp/mapping.json
      fi

      export ACTION SUB DEPT TEAM TIER
      export COUNT_PATH=$(results.mapping-count.path)
      export RESULT_PATH=$(results.action-result.path)

      python3 << 'PYEOF'
      import json, os

      action = os.environ['ACTION']
      sub = os.environ['SUB']
      dept = os.environ['DEPT']
      team = os.environ['TEAM']
      tier = os.environ['TIER']

      with open('/tmp/mapping.json') as f:
        mapping = json.load(f)

      entries = {k: v for k, v in mapping.items() if k != '_default'}
      result_msg = ""

      if action == 'add':
        if not sub or not dept or not team:
          result_msg = "ERROR: subscription, department, team 모두 필수"
          print(result_msg)
        else:
          is_update = sub in mapping
          mapping[sub] = {"department": dept, "team": team, "tier": tier}
          verb = "수정" if is_update else "추가"
          result_msg = f"{verb}: {sub} → {dept} / {team} ({tier})"
          print(result_msg)

      elif action == 'delete':
        if not sub:
          result_msg = "ERROR: subscription 필수"
          print(result_msg)
        elif sub in mapping and sub != '_default':
          del mapping[sub]
          result_msg = f"삭제: {sub}"
          print(result_msg)
        else:
          result_msg = f"NOT FOUND: {sub}"
          print(result_msg)

      elif action == 'list':
        result_msg = "조회 완료"
      else:
        result_msg = f"ERROR: 알 수 없는 action: {action}"
        print(result_msg)

      # 매핑 저장
      with open('/tmp/mapping.json', 'w') as f:
        json.dump(mapping, f, ensure_ascii=False, indent=2)

      # 결과 출력
      entries = {k: v for k, v in mapping.items() if k != '_default'}
      print(f"")
      print(f"=== 현재 매핑 테이블 ({len(entries)}개) ===")
      print(f"{'subscription':<20} {'부서':<15} {'팀':<15} {'티어':<10}")
      print("-" * 60)
      for k, v in sorted(entries.items()):
        print(f"{k:<20} {v['department']:<15} {v['team']:<15} {v['tier']:<10}")
      default = mapping.get('_default', {})
      print(f"{'_default':<20} {default.get('department',''):<15} {default.get('team',''):<15} {default.get('tier',''):<10}")

      with open(os.environ['COUNT_PATH'], 'w') as f:
        f.write(str(len(entries)))
      with open(os.environ['RESULT_PATH'], 'w') as f:
        f.write(result_msg)
      PYEOF

      # ConfigMap 멱등 업데이트 (add/delete 시에만)
      if [ "${ACTION}" = "add" ] || [ "${ACTION}" = "delete" ]; then
        oc create configmap cost-team-mapping -n customer-poc \
          --from-file=mapping.json=/tmp/mapping.json \
          --dry-run=client -o yaml | oc apply -f - 2>/dev/null
        echo ""
        echo "ConfigMap cost-team-mapping 업데이트 완료"
      fi

  volumes:
  - name: team-mapping
    configMap:
      name: cost-team-mapping
      optional: true
---
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: team-mapping-pipeline
  namespace: customer-poc
  labels:
    app.kubernetes.io/part-of: poc-pipeline
    scenario: cost-report
spec:
  description: |
    subscription→부서/팀 매핑 관리 파이프라인.
    리포트 생성 전 이 파이프라인으로 매핑 테이블을 사전 세팅한다.
    action: add(추가), list(조회), delete(삭제)
  params:
  - name: action
    type: string
    default: "list"
    description: "add=추가/수정, list=조회, delete=삭제"
  - name: subscription
    type: string
    default: ""
    description: "대상 subscription 이름"
  - name: department
    type: string
    default: ""
    description: "부서명"
  - name: team
    type: string
    default: ""
    description: "팀명"
  - name: tier
    type: string
    default: "standard"
    description: "과금 티어 (premium/standard/free)"
  tasks:
  - name: manage-mapping
    taskRef:
      kind: Task
      name: manage-team-mapping
    params:
    - name: action
      value: $(params.action)
    - name: subscription
      value: $(params.subscription)
    - name: department
      value: $(params.department)
    - name: team
      value: $(params.team)
    - name: tier
      value: $(params.tier)
