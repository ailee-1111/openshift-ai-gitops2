apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: model-e2e-7stage-pipeline
  namespace: mobis-poc
spec:
  params:
  - default: smollm2-135m
    name: model-name
    type: string
  - default: v2
    name: model-version
    type: string
  - default: smollm2-135m/v2
    name: s3-path
    type: string
  - default: poc-admin@example.com
    name: email-to
    type: string
  - default: poc-user
    name: requester
    type: string
  tasks:
  - name: stage1-register
    params:
    - name: model-name
      value: $(params.model-name)
    - name: model-version
      value: $(params.model-version)
    - name: s3-path
      value: $(params.s3-path)
    taskRef:
      kind: Task
      name: request-model-registration
  - name: stage2-notify-registration
    params:
    - name: stage
      value: 모델 등록 요청
    - name: status
      value: 승인 대기
    - name: email-to
      value: $(params.email-to)
    - name: model-name
      value: $(params.model-name)
    - name: model-version
      value: $(params.model-version)
    - name: s3-path
      value: $(params.s3-path)
    - name: namespace
      value: mobis-poc
    - name: requester
      value: $(params.requester)
    - name: pipeline-run-name
      value: $(context.pipelineRun.name)
    runAfter:
    - stage1-register
    taskRef:
      kind: Task
      name: send-notification
  - name: stage3-approve-registration
    params:
    - name: approvers
      value:
      - poc-admin
      - admin
      - group:rhods-admins
    - name: numberOfApprovalsRequired
      value: '1'
    - name: description
      value: 모델 등록 승인 요청
    runAfter:
    - stage2-notify-registration
    taskRef:
      apiVersion: openshift-pipelines.org/v1alpha1
      kind: ApprovalTask
  - name: stage4-request-deploy
    params:
    - name: model-name
      value: $(params.model-name)
    - name: s3-path
      value: $(params.s3-path)
    - name: namespace
      value: mobis-poc
    runAfter:
    - stage3-approve-registration
    taskRef:
      kind: Task
      name: request-model-deploy
  - name: stage5-notify-deploy
    params:
    - name: stage
      value: 모델 배포 완료
    - name: status
      value: 최종 승인 대기
    - name: email-to
      value: $(params.email-to)
    - name: model-name
      value: $(params.model-name)
    - name: model-version
      value: $(params.model-version)
    - name: s3-path
      value: $(params.s3-path)
    - name: namespace
      value: mobis-poc
    - name: requester
      value: $(params.requester)
    - name: pipeline-run-name
      value: $(context.pipelineRun.name)
    runAfter:
    - stage4-request-deploy
    taskRef:
      kind: Task
      name: send-notification
  - name: stage6-approve-deploy
    params:
    - name: approvers
      value:
      - poc-admin
      - admin
      - group:rhods-admins
    - name: numberOfApprovalsRequired
      value: '1'
    - name: description
      value: 모델 배포 최종 승인
    runAfter:
    - stage5-notify-deploy
    taskRef:
      apiVersion: openshift-pipelines.org/v1alpha1
      kind: ApprovalTask
  - name: stage7-deploy-and-verify
    params:
    - name: model-name
      value: $(params.model-name)
    - name: namespace
      value: mobis-poc
    - name: s3-path
      value: $(params.s3-path)
    runAfter:
    - stage6-approve-deploy
    taskRef:
      kind: Task
      name: deploy-and-verify-serving
