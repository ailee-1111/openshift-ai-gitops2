apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: request-model-registration
  namespace: mobis-poc
spec:
  params:
  - name: model-name
    type: string
  - name: model-version
    type: string
  - name: s3-path
    type: string
  - name: s3-secret
    type: string
    default: poc-s3-connection
  results:
  - name: registration-id
    type: string
  steps:
  - name: validate-s3
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    computeResources: {}
    env:
    - name: HOME
      value: /tmp
    script: |
      #!/bin/bash
      set -e
      MODEL="$(params.model-name)"
      VERSION="$(params.model-version)"
      S3PATH="$(params.s3-path)"
      S3_SECRET="$(params.s3-secret)"

      # Secret에서 S3 접속 정보 동적 로드
      AWS_S3_ENDPOINT=$(oc get secret ${S3_SECRET} -n mobis-poc \
        -o jsonpath='{.data.AWS_S3_ENDPOINT}' | base64 -d)
      AWS_S3_BUCKET=$(oc get secret ${S3_SECRET} -n mobis-poc \
        -o jsonpath='{.data.AWS_S3_BUCKET}' | base64 -d)
      AWS_ACCESS_KEY=$(oc get secret ${S3_SECRET} -n mobis-poc \
        -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
      AWS_SECRET_KEY=$(oc get secret ${S3_SECRET} -n mobis-poc \
        -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

      S3_HOST=$(echo "${AWS_S3_ENDPOINT}" | sed 's|http[s]*://||' | cut -d: -f1)
      IS_INTERNAL=$(echo "${S3_HOST}" | grep -c "svc.cluster.local" || true)

      echo "=== S3 오브젝트 스토리지 정보 ==="
      echo "  Secret:   ${S3_SECRET}"
      echo "  Endpoint: ${AWS_S3_ENDPOINT}"
      echo "  Bucket:   ${AWS_S3_BUCKET}"

      echo ""
      echo "=== S3 아티팩트 검증 ==="
      echo "  모델:  ${MODEL}"
      echo "  버전:  ${VERSION}"
      echo "  경로:  s3://${AWS_S3_BUCKET}/${S3PATH}/"

      if [ "${IS_INTERNAL}" -eq 1 ]; then
        # 내부 MinIO — oc exec로 파일 확인
        S3_NS=$(echo "${S3_HOST}" | cut -d. -f2)
        S3_DEPLOY=$(echo "${S3_HOST}" | cut -d. -f1)
        echo "  방식:  내부 MinIO (${S3_DEPLOY})"
        FILES=$(oc exec -n ${S3_NS} deploy/${S3_DEPLOY} -- \
          ls /data/${AWS_S3_BUCKET}/${S3PATH}/ 2>/dev/null || true)
      else
        # 외부 S3 — S3 ListObjects API로 확인 (anonymous → credential 순)
        echo "  방식:  외부 S3 API"
        RESP=$(curl -sk "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}?prefix=${S3PATH}/&max-keys=100" 2>/dev/null)
        if ! echo "${RESP}" | grep -q "<Key>"; then
          # anonymous 실패 시 credential로 재시도 (MinIO Pod 경유)
          S3_NS=$(echo "${S3_HOST}" | cut -d. -f2 || echo "mobis-poc")
          MINIO_DEPLOY=$(oc get deploy -n mobis-poc --no-headers -o name 2>/dev/null | grep minio | head -1 | sed 's|deployment.apps/||')
          if [ -n "${MINIO_DEPLOY}" ]; then
            RESP=$(oc exec -n mobis-poc deploy/${MINIO_DEPLOY} -- \
              curl -sk "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}?prefix=${S3PATH}/&max-keys=100" \
              --aws-sigv4 "aws:amz:us-east-1:s3" \
              -u "${AWS_ACCESS_KEY}:${AWS_SECRET_KEY}" 2>/dev/null)
          fi
        fi
        FILES=$(echo "${RESP}" | grep -o '<Key>[^<]*</Key>' | sed 's/<[^>]*>//g' | while read key; do
          echo "${key}" | sed "s|${S3PATH}/||"
        done)
      fi

      if [ -z "${FILES}" ]; then
        echo "ERROR: S3 경로에 모델 파일 없음"
        echo "  s3://${AWS_S3_BUCKET}/${S3PATH}/"
        exit 1
      fi

      FILE_COUNT=$(echo "${FILES}" | wc -l | tr -d ' ')
      echo "  파일 ${FILE_COUNT}개:"
      echo "${FILES}" | while read f; do echo "    - ${f}"; done

      HAS_CONFIG=$(echo "${FILES}" | grep -c "config.json" || true)
      HAS_SAFETENSORS=$(echo "${FILES}" | grep -c "safetensors" || true)
      if [ "${HAS_CONFIG}" -eq 0 ]; then
        echo "  WARNING: config.json 없음"
      fi
      if [ "${HAS_SAFETENSORS}" -eq 0 ]; then
        echo "  WARNING: safetensors 파일 없음"
      fi

      echo ""
      echo "=== S3 검증 PASS ==="
      echo "  승인 후 Stage 4에서 Model Registry에 등록됩니다."
      echo -n "s3-validated" > $(results.registration-id.path)
