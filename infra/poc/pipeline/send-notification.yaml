apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: send-notification
  namespace: mobis-poc
spec:
  params:
  - name: stage
    type: string
  - name: status
    type: string
  - default: dt007000@mobisdev-partners.com
    name: email-to
    type: string
  - default: unknown
    name: model-name
    type: string
  - default: unknown
    name: model-version
    type: string
  - default: unknown
    name: s3-path
    type: string
  - default: mobis-poc
    name: namespace
    type: string
  - default: poc-user
    name: requester
    type: string
  - default: unknown
    name: pipeline-run-name
    type: string
  steps:
  - computeResources: {}
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    name: notify
    script: |
      #!/bin/bash
      SUBJECT="[PoC Pipeline] $(params.stage) - $(params.status)"
      TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
      CONSOLE_URL="https://console-openshift-console.apps.poc.mobis.com"
      PIPELINE_URL="${CONSOLE_URL}/k8s/ns/$(params.namespace)/tekton.dev~v1~PipelineRun/$(params.pipeline-run-name)"
      RHOAI_URL="https://rh-ai.apps.poc.mobis.com"

      echo "알림 발송: ${SUBJECT}"

      export SUBJECT TIMESTAMP PIPELINE_URL RHOAI_URL
      export EMAIL_TO="$(params.email-to)"
      export STAGE="$(params.stage)"
      export STATUS="$(params.status)"
      export REQUESTER="$(params.requester)"
      export MODEL_NAME="$(params.model-name)"
      export MODEL_VERSION="$(params.model-version)"
      export S3_PATH="$(params.s3-path)"
      export NAMESPACE="$(params.namespace)"
      export PIPELINE_RUN_NAME="$(params.pipeline-run-name)"

      python3 << 'PYEOF'
      import smtplib, os, time
      from email.mime.text import MIMEText
      from datetime import datetime

      email_to = os.environ['EMAIL_TO']
      subject = os.environ['SUBJECT']
      stage = os.environ['STAGE']
      status = os.environ['STATUS']
      timestamp = os.environ['TIMESTAMP']
      requester = os.environ['REQUESTER']
      model_name = os.environ['MODEL_NAME']
      model_version = os.environ['MODEL_VERSION']
      s3_path = os.environ['S3_PATH']
      namespace = os.environ['NAMESPACE']
      pipeline_url = os.environ['PIPELINE_URL']
      rhoai_url = os.environ['RHOAI_URL']
      run_name = os.environ['PIPELINE_RUN_NAME']

      is_approval = '승인' in status or '대기' in status
      status_color = '#e65100' if is_approval else '#2e7d32'
      status_bg = '#fff3e0' if is_approval else '#e8f5e9'
      badge_text = '승인 대기' if is_approval else '완료'

      html = f'''<div style="font-family:'Malgun Gothic',Arial,sans-serif;max-width:700px;margin:0 auto;color:#333;">
      <h1 style="color:#1a237e;border-bottom:3px solid #1a237e;padding-bottom:10px;font-size:20px;">모델 배포 파이프라인 알림</h1>

      <div style="background:{status_bg};border-left:4px solid {status_color};padding:15px;border-radius:0 8px 8px 0;margin:15px 0;">
        <span style="background:{status_color};color:white;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:bold;">{badge_text}</span>
        <span style="font-size:16px;font-weight:bold;margin-left:10px;color:{status_color};">{stage} — {status}</span>
      </div>

      <table style="border-collapse:collapse;width:100%;margin:15px 0;font-size:14px;" cellpadding="0" cellspacing="0">
        <tr>
          <td style="background:#1a237e;color:white;text-align:center;padding:16px 10px;border-radius:8px 0 0 0;width:33%;border-right:1px solid #283593;">
            <div style="font-size:11px;opacity:0.85;">모델</div>
            <div style="font-size:18px;font-weight:bold;margin-top:4px;">{model_name}</div>
          </td>
          <td style="background:#283593;color:white;text-align:center;padding:16px 10px;width:33%;border-right:1px solid #3949ab;">
            <div style="font-size:11px;opacity:0.85;">버전</div>
            <div style="font-size:18px;font-weight:bold;margin-top:4px;">{model_version}</div>
          </td>
          <td style="background:#3949ab;color:white;text-align:center;padding:16px 10px;border-radius:0 8px 0 0;width:33%;">
            <div style="font-size:11px;opacity:0.85;">요청자</div>
            <div style="font-size:18px;font-weight:bold;margin-top:4px;">{requester}</div>
          </td>
        </tr>
      </table>

      <h2 style="color:#283593;font-size:15px;margin-top:20px;">요청 상세</h2>
      <table style="border-collapse:collapse;width:100%;font-size:13px;" cellpadding="0" cellspacing="0">
        <tr style="background:#f5f5f5;">
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;width:30%;color:#555;">단계</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;">{stage}</td>
        </tr>
        <tr>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;color:#555;">상태</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;color:{status_color};font-weight:bold;">{status}</td>
        </tr>
        <tr style="background:#f5f5f5;">
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;color:#555;">시간</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;">{timestamp}</td>
        </tr>
        <tr>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;color:#555;">S3 경로</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-family:monospace;">{s3_path}</td>
        </tr>
        <tr style="background:#f5f5f5;">
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;color:#555;">네임스페이스</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-family:monospace;">{namespace}</td>
        </tr>
        <tr>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-weight:bold;color:#555;">PipelineRun</td>
          <td style="padding:10px 12px;border-bottom:1px solid #e0e0e0;font-family:monospace;">{run_name}</td>
        </tr>
      </table>'''

      if is_approval:
        html += f'''
      <div style="text-align:center;margin:25px 0;">
        <a href="{pipeline_url}" style="display:inline-block;background:#1a237e;color:white;padding:14px 40px;border-radius:8px;text-decoration:none;font-size:15px;font-weight:bold;">승인/거부 페이지 열기</a>
      </div>
      <p style="text-align:center;font-size:12px;color:#888;">위 버튼을 클릭하면 OpenShift Console에서 승인 또는 거부할 수 있습니다.</p>'''

      html += f'''
      <div style="margin-top:25px;padding:12px;background:#fafafa;border-radius:8px;font-size:12px;color:#666;">
        <p style="margin:3px 0;"><strong>파이프라인:</strong> <a href="{pipeline_url}" style="color:#1a237e;">{run_name}</a></p>
        <p style="margin:3px 0;"><strong>RHOAI Dashboard:</strong> <a href="{rhoai_url}" style="color:#1a237e;">{rhoai_url}</a></p>
        <p style="margin:3px 0;">RHOAI MaaS (Models as a Service) — OpenShift AI PoC</p>
      </div>
      </div>'''

      msg = MIMEText(html, 'html', 'utf-8')
      msg['From'] = 'rhoai@mobis.com'
      msg['To'] = email_to
      msg['Subject'] = subject

      max_retries = 3
      for attempt in range(1, max_retries + 1):
        try:
          with smtplib.SMTP('10.240.13.184', 25, timeout=30) as server:
            server.ehlo('poc.mobis.com')
            server.sendmail(msg['From'], [email_to], msg.as_string())
          print(f"알림 발송 성공: {email_to} (시도 {attempt}/{max_retries})")
          break
        except Exception as e:
          print(f"SMTP 시도 {attempt}/{max_retries} 실패: {e}")
          if attempt < max_retries:
            time.sleep(5)
          else:
            print(f"SMTP 최종 실패 — {max_retries}회 재시도 소진")
      PYEOF
