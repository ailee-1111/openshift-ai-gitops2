apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: send-notification
  namespace: mobis-poc
spec:
  params:
  - name: stage
    type: string
  - name: status
    type: string
  - default: dt007000@mobisdev-partners.com
    name: email-to
    type: string
  - default: unknown
    name: model-name
    type: string
  - default: unknown
    name: model-version
    type: string
  - default: unknown
    name: s3-path
    type: string
  - default: mobis-poc
    name: namespace
    type: string
  - default: poc-user
    name: requester
    type: string
  - default: unknown
    name: pipeline-run-name
    type: string
  steps:
  - computeResources: {}
    image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
    name: notify
    script: |
      #!/bin/bash
      SUBJECT="[PoC Pipeline] $(params.stage) - $(params.status)"
      TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
      CONSOLE_URL="https://console-openshift-console.apps.poc.mobis.com"
      PIPELINE_URL="${CONSOLE_URL}/k8s/ns/$(params.namespace)/tekton.dev~v1~PipelineRun/$(params.pipeline-run-name)"

      echo "알림 발송: ${SUBJECT}"

      export SUBJECT TIMESTAMP PIPELINE_URL
      export EMAIL_TO="$(params.email-to)"
      export STAGE="$(params.stage)"
      export STATUS="$(params.status)"
      export REQUESTER="$(params.requester)"
      export MODEL_NAME="$(params.model-name)"
      export MODEL_VERSION="$(params.model-version)"
      export S3_PATH="$(params.s3-path)"
      export NAMESPACE="$(params.namespace)"

      python3 << 'PYEOF'
      import smtplib, os
      from email.mime.text import MIMEText

      email_to = os.environ['EMAIL_TO']
      subject = os.environ['SUBJECT']

      body = f"""=== 모델 배포 파이프라인 알림 ===

      Stage: {os.environ['STAGE']}
      Status: {os.environ['STATUS']}
      Time: {os.environ['TIMESTAMP']}

      --- 요청 정보 ---
      요청자: {os.environ['REQUESTER']}
      모델명: {os.environ['MODEL_NAME']}
      모델 버전: {os.environ['MODEL_VERSION']}
      S3 경로: {os.environ['S3_PATH']}
      네임스페이스: {os.environ['NAMESPACE']}

      --- 파이프라인 ---
      {os.environ['PIPELINE_URL']}
      """

      msg = MIMEText(body, 'plain', 'utf-8')
      msg['From'] = 'rhoai@mobis.com'
      msg['To'] = email_to
      msg['Subject'] = subject

      try:
        with smtplib.SMTP('10.240.13.184', 25) as server:
          server.sendmail(msg['From'], [email_to], msg.as_string())
        print(f"알림 발송 성공: {email_to}")
      except Exception as e:
        print(f"SMTP 발송 실패: {e}")
      PYEOF
