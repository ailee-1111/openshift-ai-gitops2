apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: validate-s3-artifact-deep
  namespace: mobis-poc
spec:
  params:
    - name: s3-path
      type: string
    - name: s3-secret
      type: string
      default: poc-s3-connection
    - name: runtime
      type: string
      default: vllm-cuda-runtime
  results:
    - name: validation-result
      type: string
  steps:
    - name: deep-validate
      image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
      computeResources: {}
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/bash
        set -e
        S3PATH="$(params.s3-path)"
        S3_SECRET="$(params.s3-secret)"
        RUNTIME="$(params.runtime)"
        NS="mobis-poc"
        ERRORS=0
        WARNINGS=0

        AWS_S3_ENDPOINT=$(oc get secret ${S3_SECRET} -n ${NS} \
          -o jsonpath='{.data.AWS_S3_ENDPOINT}' | base64 -d)
        AWS_S3_BUCKET=$(oc get secret ${S3_SECRET} -n ${NS} \
          -o jsonpath='{.data.AWS_S3_BUCKET}' | base64 -d)
        AWS_ACCESS_KEY=$(oc get secret ${S3_SECRET} -n ${NS} \
          -o jsonpath='{.data.AWS_ACCESS_KEY_ID}' | base64 -d)
        AWS_SECRET_KEY=$(oc get secret ${S3_SECRET} -n ${NS} \
          -o jsonpath='{.data.AWS_SECRET_ACCESS_KEY}' | base64 -d)

        S3_HOST=$(echo "${AWS_S3_ENDPOINT}" | sed 's|http[s]*://||' | cut -d: -f1)
        MINIO_DEPLOY=$(oc get deploy -n ${NS} --no-headers -o name 2>/dev/null \
          | grep minio | head -1 | sed 's|deployment.apps/||')

        s3_curl() {
          if [ -n "${MINIO_DEPLOY}" ]; then
            oc exec -n ${NS} deploy/${MINIO_DEPLOY} -- \
              curl -sk --max-time 15 \
              --aws-sigv4 "aws:amz:us-east-1:s3" \
              -u "${AWS_ACCESS_KEY}:${AWS_SECRET_KEY}" \
              "$@" 2>/dev/null
          else
            curl -sk --max-time 15 "$@" 2>/dev/null
          fi
        }

        s3_curl_head() {
          if [ -n "${MINIO_DEPLOY}" ]; then
            oc exec -n ${NS} deploy/${MINIO_DEPLOY} -- \
              curl -sk --max-time 10 -I \
              --aws-sigv4 "aws:amz:us-east-1:s3" \
              -u "${AWS_ACCESS_KEY}:${AWS_SECRET_KEY}" \
              "$@" 2>/dev/null
          else
            curl -sk --max-time 10 -I "$@" 2>/dev/null
          fi
        }

        echo "========================================"
        echo " S3 아티팩트 심층 검증"
        echo "========================================"
        echo "  경로:     s3://${AWS_S3_BUCKET}/${S3PATH}/"
        echo "  Endpoint: ${AWS_S3_ENDPOINT}"
        echo "  Runtime:  ${RUNTIME}"
        echo "  GPU:      ${GPU_COUNT}"
        echo ""

        # ── ListObjects로 파일 목록 + 크기 수집 ──
        LIST_XML=$(s3_curl "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}?prefix=${S3PATH}/&max-keys=200")

        python3 -c "
        import xml.etree.ElementTree as ET, json, sys
        tree = ET.fromstring('''${LIST_XML}''')
        files = []
        for content in tree.iter():
            if 'Contents' in content.tag:
                key, size = '', 0
                for child in content:
                    if 'Key' in child.tag: key = child.text
                    if 'Size' in child.tag: size = int(child.text)
                if key:
                    name = key.split('/')[-1]
                    if name:
                        files.append({'key': key, 'name': name, 'size': size})
        json.dump(files, open('/tmp/s3files.json','w'))
        print(f'파일 {len(files)}개 발견')
        for f in files:
            mb = f['size']/1024/1024
            print(f\"  {mb:10.1f} MB  {f['name']}\")
        " || { echo "ERROR: S3 ListObjects 실패"; exit 1; }

        FILE_COUNT=$(python3 -c "import json; print(len(json.load(open('/tmp/s3files.json'))))")
        if [ "${FILE_COUNT}" -eq 0 ]; then
          echo "❌ [FAIL] S3 경로에 파일 없음"
          echo -n "FAIL" > $(results.validation-result.path)
          exit 1
        fi

        echo ""
        echo "── 검사 1/6: Git LFS Pointer 감지 ──"
        LFS_COUNT=0
        for KEY in $(python3 -c "
        import json
        files = json.load(open('/tmp/s3files.json'))
        for f in files:
            if f['size'] > 0 and f['size'] < 1024:
                print(f['key'])
        "); do
          FNAME=$(basename "${KEY}")
          HEADER=$(s3_curl -r 0-49 "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}/${KEY}")
          if echo "${HEADER}" | grep -q "version https://git-lfs"; then
            echo "  ❌ LFS pointer: ${FNAME}"
            LFS_COUNT=$((LFS_COUNT+1))
          fi
        done
        if [ ${LFS_COUNT} -gt 0 ]; then
          echo "  ❌ [FAIL] ${LFS_COUNT}개 Git LFS pointer 발견"
          ERRORS=$((ERRORS+1))
        else
          echo "  ✅ LFS pointer 없음"
        fi

        echo ""
        echo "── 검사 2/6: S3 GetObject 권한 ──"
        FIRST_KEY=$(python3 -c "import json; f=json.load(open('/tmp/s3files.json')); print(f[0]['key'] if f else '')")
        if [ -n "${FIRST_KEY}" ]; then
          HEAD_RESP=$(s3_curl_head "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}/${FIRST_KEY}")
          HTTP_CODE=$(echo "${HEAD_RESP}" | grep -i "^HTTP" | tail -1 | awk '{print $2}')
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "  ✅ GetObject 권한 정상 (HTTP ${HTTP_CODE})"
          else
            echo "  ❌ [FAIL] GetObject 실패 (HTTP ${HTTP_CODE})"
            ERRORS=$((ERRORS+1))
          fi
        fi

        echo ""
        echo "── 검사 3/6: 0바이트 / 비정상 크기 ──"
        python3 -c "
        import json
        files = json.load(open('/tmp/s3files.json'))
        bad = 0
        for f in files:
            if f['name'].endswith(('.safetensors','.bin','.pt')) and f['size'] < 1048576:
                print(f\"  ❌ 비정상 크기: {f['name']} ({f['size']} bytes)\")
                bad += 1
            elif f['size'] == 0 and f['name']:
                print(f\"  ⚠️  0바이트: {f['name']}\")
        if bad > 0:
            print(f'  ❌ [FAIL] 모델 파일 {bad}개가 1MB 미만')
            open('/tmp/check3','w').write('FAIL')
        else:
            print('  ✅ 파일 크기 정상')
            open('/tmp/check3','w').write('PASS')
        "
        [ "$(cat /tmp/check3)" = "FAIL" ] && ERRORS=$((ERRORS+1))

        echo ""
        echo "── 검사 4/6: 필수 파일 존재 ──"
        python3 -c "
        import json
        files = json.load(open('/tmp/s3files.json'))
        names = [f['name'] for f in files]
        has_config = 'config.json' in names
        has_safetensors = any(n.endswith('.safetensors') for n in names)
        has_bin = any(n.endswith('.bin') for n in names)
        has_model = has_safetensors or has_bin
        ok = True
        if not has_config:
            print('  ❌ config.json 누락'); ok = False
        else:
            print('  ✅ config.json')
        if has_safetensors:
            st_count = sum(1 for n in names if n.endswith('.safetensors'))
            print(f'  ✅ safetensors ({st_count}개)')
        elif has_bin:
            bin_count = sum(1 for n in names if n.endswith('.bin'))
            print(f'  ✅ pytorch bin ({bin_count}개)')
        else:
            print('  ❌ 모델 가중치 파일 없음 (safetensors/bin)'); ok = False
        has_tokenizer = any('tokenizer' in n for n in names)
        if has_tokenizer:
            print('  ✅ tokenizer')
        else:
            print('  ⚠️  tokenizer 파일 없음')
        open('/tmp/check4','w').write('PASS' if ok else 'FAIL')
        "
        [ "$(cat /tmp/check4)" = "FAIL" ] && ERRORS=$((ERRORS+1))

        echo ""
        echo "── 검사 5/6: Safetensors 헤더 검증 ──"
        ST_KEY=$(python3 -c "
        import json
        files = json.load(open('/tmp/s3files.json'))
        for f in files:
            if f['name'].endswith('.safetensors') and f['size'] > 1048576:
                print(f['key']); break
        " 2>/dev/null)
        if [ -n "${ST_KEY}" ]; then
          HEADER_BYTES=$(s3_curl -r 0-7 "${AWS_S3_ENDPOINT}/${AWS_S3_BUCKET}/${ST_KEY}" | od -A n -t u8 -N 8 | tr -d ' ')
          if [ -n "${HEADER_BYTES}" ] && [ "${HEADER_BYTES}" -gt 0 ] 2>/dev/null && [ "${HEADER_BYTES}" -lt 104857600 ] 2>/dev/null; then
            HEADER_MB=$((HEADER_BYTES / 1048576))
            echo "  ✅ 헤더 크기: ${HEADER_BYTES} bytes (${HEADER_MB} MB) — 정상 범위"
          else
            echo "  ❌ [FAIL] 비정상 헤더: ${HEADER_BYTES}"
            ERRORS=$((ERRORS+1))
          fi
        else
          echo "  ⏭️  safetensors 파일 없음 (스킵)"
        fi

        echo ""
        echo "── 검사 6/6: 모델 포맷 일치 ──"
        python3 -c "
        import json
        files = json.load(open('/tmp/s3files.json'))
        names = [f['name'] for f in files]
        runtime = '${RUNTIME}'
        has_gguf = any(n.endswith('.gguf') for n in names)
        is_vllm = 'vllm' in runtime.lower()
        if has_gguf and is_vllm:
            print('  ❌ [FAIL] GGUF 포맷은 vLLM runtime과 호환되지 않음')
            open('/tmp/check7','w').write('FAIL')
        elif has_gguf:
            print(f'  ⚠️  GGUF 포맷 감지 (runtime: {runtime})')
            open('/tmp/check7','w').write('PASS')
        else:
            has_st = any(n.endswith('.safetensors') for n in names)
            has_bin = any(n.endswith('.bin') for n in names)
            fmt = 'safetensors' if has_st else 'pytorch' if has_bin else 'unknown'
            print(f'  ✅ 포맷: {fmt}, runtime: {runtime} — 호환')
            open('/tmp/check7','w').write('PASS')
        "
        [ "$(cat /tmp/check7)" = "FAIL" ] && ERRORS=$((ERRORS+1))

        # ── 종합 판정 ──
        echo ""
        echo "========================================"
        echo " 종합 결과: 오류 ${ERRORS}건"
        echo "========================================"
        if [ ${ERRORS} -eq 0 ]; then
          echo " ✅ 판정: PASS"
          echo -n "PASS" > $(results.validation-result.path)
        else
          echo " ❌ 판정: FAIL (${ERRORS}건 오류)"
          echo -n "FAIL" > $(results.validation-result.path)
          exit 1
        fi
