apiVersion: batch/v1
kind: CronJob
metadata:
  name: trans-job-fixer
  namespace: mobis-poc
  labels:
    app: trans-job-fixer
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 55
      template:
        metadata:
          labels:
            app: trans-job-fixer
        spec:
          serviceAccountName: trans-job-fixer
          restartPolicy: Never
          containers:
            - name: fixer
              image: image-registry.openshift-image-registry.svc:5000/openshift/cli:latest
              command: ["/bin/bash", "/scripts/fix-trans-jobs.sh"]
              env:
                - name: NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
              volumeMounts:
                - name: script
                  mountPath: /scripts
                  readOnly: true
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                seccompProfile:
                  type: RuntimeDefault
          volumes:
            - name: script
              configMap:
                name: trans-job-fixer-script
                defaultMode: 0555
