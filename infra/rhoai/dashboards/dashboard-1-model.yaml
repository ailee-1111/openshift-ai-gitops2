apiVersion: perses.dev/v1alpha2
kind: PersesDashboard
metadata:
  annotations:
    internal.config.kubernetes.io/previousKinds: PersesDashboard
    internal.config.kubernetes.io/previousNames: dashboard-1-model
    internal.config.kubernetes.io/previousNamespaces: default
  labels:
    app.kubernetes.io/part-of: dashboard
    app.opendatahub.io/dashboard: 'true'
  name: dashboard-1-model
  namespace: redhat-ods-monitoring
spec:
  config:
    display:
      name: Models
    duration: 1h
    layouts:
    - kind: Grid
      spec:
        display:
          collapse:
            open: true
          title: Model deployments
        items:
        - content:
            $ref: '#/spec/panels/modelDeploymentsTable'
          height: 9
          width: 24
          x: 0
          y: 0
    - kind: Grid
      spec:
        display:
          collapse:
            open: true
          title: Performance metrics
        items:
        - content:
            $ref: '#/spec/panels/requestQueueLength'
          height: 8
          width: 12
          x: 0
          y: 0
        - content:
            $ref: '#/spec/panels/replicaCount'
          height: 8
          width: 12
          x: 12
          y: 0
        - content:
            $ref: '#/spec/panels/requestLatency'
          height: 8
          width: 12
          x: 0
          y: 8
        - content:
            $ref: '#/spec/panels/timeToFirstToken'
          height: 8
          width: 12
          x: 12
          y: 8
        - content:
            $ref: '#/spec/panels/tokenThroughput'
          height: 8
          width: 12
          x: 0
          y: 16
        - content:
            $ref: '#/spec/panels/requestSuccessRate'
          height: 8
          width: 12
          x: 12
          y: 16
        - content:
            $ref: '#/spec/panels/responseTimeDistribution'
          height: 8
          width: 24
          x: 0
          y: 24
    panels:
      modelDeploymentsTable:
        kind: Panel
        spec:
          display:
            name: Model deployments
          plugin:
            kind: Table
            spec:
              columnSettings:
              - hide: true
                name: timestamp
              - enableSorting: true
                header: Model deployment
                name: model_name
                sort: desc
              - enableSorting: true
                header: Project
                name: namespace
              - hide: true
                name: 'value #1'
              - enableSorting: true
                format:
                  decimalPlaces: 0
                  unit: decimal
                header: Total requests
                name: 'value #2'
              - enableSorting: true
                format:
                  unit: seconds
                header: P90 E2E request latency
                name: 'value #3'
              - enableSorting: true
                format:
                  unit: percent-decimal
                header: Error rate
                name: 'value #4'
              - enableSorting: true
                format:
                  unit: percent
                header: GPU utilization
                name: 'value #5'
              - enableSorting: true
                format:
                  unit: percent-decimal
                header: CPU utilization
                name: 'value #6'
              density: compact
              pagination: true
              transforms:
              - kind: MergeSeries
                spec: {}
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: group by (model_name, namespace) (kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"})
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: sum by (model_name, namespace) (increase(kserve_vllm:request_success_total{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__range])) or (0 * group by (model_name,
                    namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: avg_over_time((histogram_quantile(0.90, sum by (le, model_name,
                    namespace) (rate(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__rate_interval]))) > -Inf)[$__range:])
                    or (0 * group by (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (sum by (model_name, namespace)(increase(kserve_vllm:request_success_total{namespace=~"$namespace",
                    finished_reason=~"error|abort", model_name=~"$model_name"}[$__range]))
                    / (sum by (model_name, namespace)(increase(kserve_vllm:request_success_total{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__range])) > 0)) or (0 * group by
                    (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: avg_over_time((sum by (model_name, namespace) (label_replace(label_replace(accelerator_gpu_utilization{exported_namespace=~"$namespace"},
                    "namespace", "$1", "exported_namespace", "(.*)"), "pod", "$1",
                    "exported_pod", "(.*)") * on(namespace, pod) group_left(model_name)(0
                    * max by (namespace, pod, model_name)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}) + 1)) / scalar(count(accelerator_gpu_utilization)))[$__range:])
                    or (0 * group by (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: avg_over_time((sum by (model_name, namespace) (node_namespace_pod_container:container_cpu_usage_seconds_total:sum_irate{namespace=~"$namespace"}
                    * on(namespace, pod) group_left(model_name) (0 * group by (model_name,
                    namespace, pod)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}) + 1)) / scalar(sum(kube_node_status_allocatable{resource="cpu"})))[$__range:])
                    or (0 * group by (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
      replicaCount:
        kind: Panel
        spec:
          display:
            name: Replica count
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: count by (model_name, namespace) (group by (pod, model_name,
                    namespace) (kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
                  seriesNameFormat: '{{model_name}}'
      requestLatency:
        kind: Panel
        spec:
          display:
            name: P90 E2E request latency
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: seconds
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (histogram_quantile(0.90, sum by (le, model_name, namespace)
                    (rate(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__rate_interval]))) > -Inf) or (0
                    * group by (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
                  seriesNameFormat: '{{model_name}}'
      requestQueueLength:
        kind: Panel
        spec:
          display:
            name: Request queue length
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: sum by (model_name, namespace) (kserve_vllm:num_requests_waiting{namespace=~"$namespace",
                    model_name=~"$model_name"})
                  seriesNameFormat: '{{model_name}}'
      requestSuccessRate:
        kind: Panel
        spec:
          display:
            name: Request success rate (requests/sec)
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: sum by (model_name, namespace) (rate(kserve_vllm:request_success_total{namespace=~"$namespace",
                    model_name=~"$model_name", finished_reason=~"length|stop"}[$__rate_interval]))
                  seriesNameFormat: '{{model_name}}'
      responseTimeDistribution:
        kind: Panel
        spec:
          display:
            name: Response time distribution
          plugin:
            kind: BarChart
            spec:
              calculation: last
              sort: asc
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="+Inf"}[$__range]))) - (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="30.0"}[$__range])))
                  seriesNameFormat: Degraded >30s
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="30.0"}[$__range]))) - (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="5.0"}[$__range])))
                  seriesNameFormat: Slow 5-30s
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="5.0"}[$__range]))) - (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="1.0"}[$__range])))
                  seriesNameFormat: Acceptable 1-5s
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (sum(increase(kserve_vllm:e2e_request_latency_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name", le="1.0"}[$__range])))
                  seriesNameFormat: Fast <1s
      timeToFirstToken:
        kind: Panel
        spec:
          display:
            name: P90 Time to first token (TTFT)
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: seconds
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: (histogram_quantile(0.90, sum by (le, model_name, namespace)
                    (rate(kserve_vllm:time_to_first_token_seconds_bucket{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__rate_interval]))) > -Inf) or (0
                    * group by (model_name, namespace)(kserve_vllm:num_requests_running{namespace=~"$namespace",
                    model_name=~"$model_name"}))
                  seriesNameFormat: '{{model_name}}'
      tokenThroughput:
        kind: Panel
        spec:
          display:
            name: Token throughput (tokens/sec)
          plugin:
            kind: TimeSeriesChart
            spec:
              legend:
                mode: list
                position: bottom
                values: []
              visual:
                areaOpacity: 0
                connectNulls: false
                display: line
                lineWidth: 1.5
              yAxis:
                format:
                  unit: decimal
                min: 0
          queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                  query: sum by(model_name, namespace) (rate(kserve_vllm:prompt_tokens_total{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__rate_interval]) + rate(kserve_vllm:generation_tokens_total{namespace=~"$namespace",
                    model_name=~"$model_name"}[$__rate_interval]))
                  seriesNameFormat: '{{model_name}}'
    variables:
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue: $__all
        display:
          description: Filter by project
          hidden: false
          name: Project
        name: namespace
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
            labelName: namespace
            matchers:
            - kserve_vllm:num_requests_running
    - kind: ListVariable
      spec:
        allowAllValue: true
        allowMultiple: true
        customAllValue: .*
        defaultValue: $__all
        display:
          description: Filter by model deployment
          hidden: false
          name: Model deployment
        name: model_name
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
            labelName: model_name
            matchers:
            - kserve_vllm:num_requests_running{namespace=~"$namespace"}
