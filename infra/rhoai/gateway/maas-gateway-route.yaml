# maas-default-gateway Serviceм—җ лҢҖн•ң мҷёл¶Җ м ‘к·ј Route
# maas-uiк°Җ MaaS API(api-keys, models л“ұ)лҘј нҳём¶ңн•  л•Ң мқҙ RouteлҘј нҶөн•ҙ м ‘к·јн•ңлӢӨ.
# Gateway ServiceлҠ” Istio proxyмқҙлҜҖлЎң TLS passthroughлЎң м§Ғм ‘ м „лӢ¬н•ңлӢӨ.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: maas-gateway
  namespace: openshift-ingress
  labels:
    app.kubernetes.io/part-of: rhoai
    app.kubernetes.io/component: models-as-service
spec:
  host: maas.CLUSTER_DOMAIN
  port:
    targetPort: 443
  tls:
    termination: passthrough
  to:
    kind: Service
    name: maas-default-gateway-data-science-gateway-class
    weight: 100
  wildcardPolicy: None
