    identifier: nvidia.com/gpu
    maxCount: 2
    minCount: 1
    resourceType: Accelerator
  scheduling:
    node:
      nodeSelector:
        nvidia.com/gpu.product: NVIDIA-A40
      tolerations: []
    type: Node
