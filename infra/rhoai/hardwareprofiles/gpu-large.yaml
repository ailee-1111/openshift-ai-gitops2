apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/description: 대형 모델 서빙용 — 30B+ 모델
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: GPU Large (8C/32Gi/2GPU)
  labels:
    app.opendatahub.io/hardwareprofile: 'true'
  name: gpu-large
  namespace: redhat-ods-applications
spec:
  identifiers:
  - defaultCount: 8
    displayName: CPU
    identifier: cpu
    maxCount: 16
    minCount: 4
    resourceType: CPU
  - defaultCount: 32Gi
    displayName: Memory
    identifier: memory
    maxCount: 64Gi
    minCount: 16Gi
    resourceType: Memory
  - defaultCount: 2
    displayName: NVIDIA GPU
    identifier: nvidia.com/gpu
    maxCount: 4
    minCount: 1
    resourceType: Accelerator
