apiVersion: infrastructure.opendatahub.io/v1
kind: HardwareProfile
metadata:
  annotations:
    opendatahub.io/description: 경량 모델 서빙용
    opendatahub.io/disabled: 'false'
    opendatahub.io/display-name: GPU Small (2C/8Gi/1GPU)
  labels:
    app.opendatahub.io/hardwareprofile: 'true'
  name: gpu-small
  namespace: redhat-ods-applications
spec:
  identifiers:
  - defaultCount: 2
    displayName: CPU
    identifier: cpu
    maxCount: 4
    minCount: 1
    resourceType: CPU
  - defaultCount: 8Gi
    displayName: Memory
    identifier: memory
    maxCount: 16Gi
    minCount: 4Gi
    resourceType: Memory
  - defaultCount: 1
    displayName: NVIDIA GPU
    identifier: nvidia.com/gpu
    maxCount: 1
    minCount: 1
    resourceType: Accelerator
