apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-perses-operator
  namespace: redhat-ods-monitoring
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: perses
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
