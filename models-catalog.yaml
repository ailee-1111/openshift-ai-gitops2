        # Qwen3.6-27B-FP8
        
        <img width="400px" src="https://qianwen-res.oss-accelerate.aliyuncs.com/Qwen3.6/logo.png">
        
        [![Qwen Chat](https://img.shields.io/badge/%F0%9F%92%9C%EF%B8%8F%20Qwen%20Chat%20-536af5)](https://chat.qwen.ai)
        
        > [!Note]
        > This repository contains FP8-quantized model weights and configuration files for the post-trained model in the Hugging Face Transformers format. 
        >
        > These artifacts are compatible with Hugging Face Transformers, vLLM, SGLang, KTransformers, etc.
        >
        > The quantization method is fine-grained fp8 quantization with block size of 128, and its performance metrics are nearly identical to those of the original model.
        
        Following the February release of the Qwen3.5 series, we're pleased to share the first open-weight variant of Qwen3.6. Built on direct feedback from the community, Qwen3.6 prioritizes stability and real-world utility, offering developers a more intuitive, responsive, and genuinely productive coding experience.
        
        ## Qwen3.6 Highlights
        
        This release delivers substantial upgrades, particularly in
        
        - **Agentic Coding:** the model now handles frontend workflows and repository-level reasoning with greater fluency and precision. 
        - **Thinking Preservation:** we've introduced a new option to retain reasoning context from historical messages, streamlining iterative development and reducing overhead. 
        
        ![Benchmark Results](https://qianwen-res.oss-cn-beijing.aliyuncs.com/Qwen3.6/Figures/qwen3.6_27b_score.png)
        
        For more details, please refer to our blog post [Qwen3.6-27B](https://qwen.ai/blog?id=qwen3.6-27b).
        
        ## Model Overview
        
        - Type: Causal Language Model with Vision Encoder
        - Training Stage: Pre-training & Post-training
        - Language Model
            - Number of Parameters: 27B
            - Hidden Dimension: 5120
            - Token Embedding: 248320 (Padded)
            - Number of Layers: 64
            - Hidden Layout: 16 × (3 × (Gated DeltaNet → FFN) → 1 × (Gated Attention → FFN))
            - Gated DeltaNet:
                - Number of Linear Attention Heads: 48 for V and 16 for QK
                - Head Dimension: 128
            - Gated Attention:
                - Number of Attention Heads: 24 for Q and 4 for KV
                - Head Dimension: 256
                - Rotary Position Embedding Dimension: 64
            - Feed Forward Network:
                - Intermediate Dimension: 17408
            - LM Output: 248320 (Padded)
            - MTP: trained with multi-steps  
        - Context Length: 262,144 natively and extensible up to 1,010,000 tokens.
        
        
