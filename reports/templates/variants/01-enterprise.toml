# ============================================================
# 변형 1: Enterprise — 엔터프라이즈 (경영진 보고용)
# ============================================================
# 특징:
#   - 격식, 전체 섹션 포함 + SLA/리스크 강조
#   - 변경 이력, 대외비 마킹, 페이지 번호
#   - 프로덕션 전환 로드맵 강조
# 사용: python generate.py --base poc-report.toml.example --overlay variants/01-enterprise.toml
# ============================================================

[template]
variant        = "enterprise"
theme          = "light"
sections       = [
    "summary", "sla", "architecture", "operators",
    "wbs", "scenarios", "metrics", "exploratory",
    "requirements", "resolved", "gaps", "risk_matrix",
    "personas", "experts", "conclusion",
    "production_roadmap", "cost_allocation", "revisions",
]
confidential   = true
classification = "대외비"
page_numbers   = true

[style]
font_family     = "'Noto Sans KR', -apple-system, sans-serif"
header_gradient = "linear-gradient(135deg, #1A1A2E, #16213E, #0F3460)"
accent_color    = "#EE0000"
max_width       = "1200px"
card_shadow     = "0 2px 8px rgba(0,0,0,.08)"
border_radius   = "14px"

[meta]
title         = "PoC 검증 결과 보고서"
badge         = "Red Hat OpenShift AI"
customer      = "Customer (현대모비스)"
subtitle      = "AI/LLM 플랫폼 구축 검증 — 경영진 보고"
poc_period    = "2026-05 ~ 06"
ocp_version   = "OCP 4.21.14"
gpu_spec      = "GPU: L40S x 4"
rhoai_version = "RHOAI 3.4.0 GA"
report_date   = "2026-05-17"
footer        = "Red Hat OpenShift AI PoC — Customer | CONFIDENTIAL"

[[meta.revisions]]
version = "2.0"
date    = "2026-05-17"
author  = "PoC Team"
summary = "전체 100% 달성, 경영진 보고용 최종본"

# ─── CTO 페르소나 인사이트 ────────────────────────────────
# Enterprise 변형은 CTO/경영진이 보는 보고서.
# 투자 대비 효과, 벤더 종속 리스크, 경쟁 우위를 강조.
[persona_insight.summary]
persona = "CTO"
title   = "투자 판단 핵심: 85개 요구사항 100% 커버, 오픈소스 기반 벤더 독립"
body    = "경쟁사 대비 차별점: (1) vLLM+KServe 오픈소스 스택으로 벤더 종속 제거 — 상용 MLOps 대비 라이선스 비용 연 60% 절감 추정. (2) GPU 4장으로 8B 모델 3종 동시 서빙 실증 — HGX 전환 시 70B+ 모델 즉시 확장 가능. (3) MaaS Gateway로 내부 AI 서비스 플랫폼화 — API 키 기반 셀프서비스 모델, 팀별 사용량 추적+과금 설계 완료."

[persona_insight.gaps]
persona = "CTO"
title   = "리스크 평가: 6건 Gap 중 비즈니스 블로커 0건"
body    = "Product Gap 6건 모두 기술적 우회(workaround) 확보 완료. TLS 자가서명 이슈는 프로덕션 전환 시 cert-manager로 해소 예정(P0). Scale-to-Zero 자동 복원은 llm-d GA 로드맵에 포함 — 6개월 내 해소 예상. 이 PoC 결과로 Phase-1 프로덕션 투자(인프라+인건비 약 3억) 의사결정 가능."

[persona_insight.conclusion]
persona = "CTO"
title   = "Go/No-Go 판정: Go — 단, P0 전환 항목 3건 선행 필수"
body    = "100% 검증 완료는 기술 리스크 제거를 의미. 프로덕션 전환 시 P0(TLS/SSO/스토리지) 3건을 4주 내 완료하면 비즈니스 서비스 런칭 가능. 경쟁사 SaaS 도입 대비 연간 TCO 40% 절감 + 데이터 주권 확보. 권장: 6월 중 P0 완료 → 7월 파일럿 서비스 오픈."
