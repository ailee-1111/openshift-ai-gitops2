# ============================================================
# 변형 2: Print — 인쇄 최적화
# ============================================================
# 특징: 흑백 친화, 차트→테이블, A4 최적화, 페이지 나눔 제어
# 사용: python generate.py --base poc-report.toml.example --overlay variants/02-print.toml
# ============================================================

[template]
variant          = "print"
theme            = "light"
sections         = [
    "summary", "sla", "architecture", "operators",
    "wbs", "scenarios", "metrics", "exploratory",
    "requirements", "resolved", "gaps",
    "personas", "conclusion", "production_roadmap",
]
page_numbers     = true
charts_as_tables = true
mermaid_enabled  = false

[style]
font_family     = "'Noto Sans KR', serif"
header_gradient = "none"
header_bg       = "#1A1A2E"
accent_color    = "#333333"
max_width       = "800px"
card_shadow     = "none"
border_radius   = "4px"
print_friendly  = true

[meta]
title         = "PoC 검증 결과 보고서"
badge         = "Red Hat OpenShift AI"
customer      = "Mobis (현대모비스)"
subtitle      = "AI/LLM 플랫폼 구축 검증"
poc_period    = "2026-05 ~ 06"
ocp_version   = "OCP 4.21.14"
gpu_spec      = "GPU: L40S x 4"
rhoai_version = "RHOAI 3.4.0 GA"
report_date   = "2026-05-17"
footer        = "Red Hat OpenShift AI PoC — Mobis | 인쇄용"

# ─── 솔루션 아키텍트 페르소나 인사이트 ──────────────────────
# Print 변형은 고객 제출용 공식 문서.
# 아키텍처 결정의 근거, 기술 선택 이유, 확장 경로를 명시.
[persona_insight.summary]
persona = "솔루션 아키텍트"
title   = "아키텍처 판단: 6-Layer 의존성 구조로 운영 복잡도 최소화"
body    = "17개 Operator를 6개 Layer로 분리하여 설치 순서 의존성을 명시적으로 관리. Layer 1(GitOps/cert-manager) → Layer 6(KServe 워크로드)까지 순서 위반 시 실패하는 항목을 사전에 차단. 이 구조는 프로덕션에서 Day-2 Operator 업그레이드 시에도 영향 범위를 Layer 단위로 격리할 수 있어 운영 안정성을 보장."

[persona_insight.metrics]
persona = "솔루션 아키텍트"
title   = "아키텍처 병목점 분석"
body    = "Cold Start 61~73초는 S3→GPU VRAM 로딩 구간이 지배적. 프로덕션에서는 ODF(Ceph) ReadWriteMany PVC + 모델 캐시 전략으로 30초 이내 달성 가능. E2E 레이턴시 0.63초(SmolLM2-135M)는 네트워크 홉 최소화(KServe→vLLM 직접 연결) 덕분. 8B 모델에서는 TTFT 2~3초 예상 — Speculative Decoding 적용 시 40% 개선 가능."

[persona_insight.conclusion]
persona = "솔루션 아키텍트"
title   = "확장 아키텍처: 현재 구조에서 100+ 모델 서빙까지 수평 확장 경로 확보"
body    = "MaaS Gateway + llm-d EPP Router 조합으로 모델 수 증가 시에도 단일 엔드포인트 유지. Kueue Fair-Share로 팀별 GPU 할당 보장. 현재 L40S x4 → HGX H200 x8 전환 시 TP=4/PP=2로 70B 모델 서빙 가능하며, LWS CRD로 멀티노드 확장도 실증 완료."
