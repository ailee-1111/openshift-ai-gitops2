# ============================================================
# 변형 4: Presentation — 프레젠테이션 (슬라이드형)
# ============================================================
# 특징: 큰 폰트, 핵심 수치만, 슬라이드별 단일 메시지
# 사용: python generate.py --base poc-report.toml.example --overlay variants/04-presentation.toml
# ============================================================

[template]
variant          = "presentation"
theme            = "light"
sections         = [
    "summary", "sla", "architecture", "metrics",
    "scenarios", "gaps", "personas", "conclusion",
    "production_roadmap",
]
charts_as_tables = false
mermaid_enabled  = true
slide_mode       = true

[style]
font_family     = "'Noto Sans KR', -apple-system, sans-serif"
header_gradient = "linear-gradient(135deg, #EE0000, #CC0000)"
accent_color    = "#EE0000"
max_width       = "1000px"
card_shadow     = "0 8px 24px rgba(0,0,0,.1)"
border_radius   = "20px"
heading_size    = "36px"
body_size       = "18px"
kpi_value_size  = "64px"
section_padding = "60px 0"
min_height      = "80vh"

[meta]
title         = "PoC 검증 결과"
badge         = "Red Hat OpenShift AI"
customer      = "Customer (현대모비스)"
subtitle      = "100% 커버율 달성"
poc_period    = "2026-05 ~ 06"
ocp_version   = "OCP 4.21.14"
gpu_spec      = "L40S x 4"
rhoai_version = "RHOAI 3.4.0 GA"
report_date   = "2026-05-17"
footer        = ""

# ─── 비즈니스 스토리텔러 페르소나 인사이트 ─────────────────
# Presentation은 고객 발표용. 숫자보다 스토리, 기술보다 가치.
[persona_insight.summary]
persona = "비즈니스 스토리텔러"
title   = "한 줄 요약: AI 플랫폼을 2주 만에 구축하고, 요구사항 100%를 충족했습니다"
body    = "이번 PoC가 증명한 것: 첫째, OpenShift AI는 '설치만 하면 끝'이 아닌 실제 프로덕션 시나리오를 통과합니다. 모델 등록부터 배포 승인, 오토스케일링, 장애 복구, Scale-to-Zero까지 고객이 요청한 모든 시나리오를 실증했습니다. 둘째, 오픈소스 기반이라 벤더 종속이 없습니다. 셋째, GPU 4장으로 3개 모델을 동시에 서빙하면서도 복구 66초, 배포 실패율 0%를 달성했습니다."

[persona_insight.conclusion]
persona = "비즈니스 스토리텔러"
title   = "다음 단계: 4주 만에 파일럿 서비스 런칭 가능"
body    = "PoC에서 프로덕션까지의 거리는 딱 3가지입니다: TLS 인증서 교체(1주), 인증 체계 전환(1주), 스토리지 업그레이드(2주). 이 3가지만 완료하면 즉시 내부 AI 서비스를 오픈할 수 있습니다. 경쟁사 SaaS 대비 연간 40% 비용 절감 + 데이터가 외부로 나가지 않는 보안 이점까지."
